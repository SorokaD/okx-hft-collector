groups:
  - name: okx-collector-alerts
    rules:
      # Алерт на разрыв WebSocket соединения
      - alert: WebSocketConnectionDown
        expr: increase(reconnects_total[10m]) > 3
        for: 5m      # OKX WS может переподключаться кратковременно
        labels:
          severity: warning
        annotations:
          summary: "Frequent OKX WebSocket reconnects"
          description: "More than 3 reconnects in last 10 minutes (value={{ $value }})"

      # Алерт на отсутствие данных
      - alert: NoDataReceived
        expr: rate(events_total[5m]) == 0
        for: 5m      # OKX может иметь паузы/тишину в потоке
        labels:
          severity: critical
        annotations:
          summary: "No data received from OKX"
          description: "No events received from OKX WebSocket in the last 5 minutes"

      # Алерт на высокую задержку event loop
      - alert: HighEventLoopLag
        expr: event_loop_lag_ms > 100
        for: 5m      # Игнорируем короткие пики
        labels:
          severity: warning
        annotations:
          summary: "High event loop lag"
          description: "Event loop lag is {{ $value }}ms, which is above 100ms threshold"

      # Алерт на ошибки вставки данных
      - alert: DataInsertionErrors
        expr: increase(events_total{channel="unknown"}[10m]) > 20
        for: 5m      # Смотрим тренд, а не мгновенный всплеск
        labels:
          severity: warning
        annotations:
          summary: "High number of unknown events"
          description: "{{ $value }} unknown events received in the last 10 minutes"

      # Алерт на недоступность коллектора
      - alert: CollectorDown
        expr: up{job="okx-collector"} == 0
        for: 2m      # Дадим время на перезапуск/грейс
        labels:
          severity: critical
        annotations:
          summary: "OKX Collector is down"
          description: "OKX Collector service is not responding"

      # Алерт на недоступность PostgreSQL/TimescaleDB
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL/TimescaleDB is down"
          description: "PostgreSQL/TimescaleDB service is not responding"

      # Алерт на низкую частоту событий
      - alert: LowEventRate
        expr: rate(events_total[5m]) < 0.05
        for: 10m     # Стабильно низкий поток
        labels:
          severity: warning
        annotations:
          summary: "Low event rate from OKX"
          description: "Event rate is {{ $value }} events/sec over 5m, below threshold"

      # Алерт на высокое потребление памяти
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 800
        for: 10m     # Стабильное потребление
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}MB, which is above 800MB threshold"
